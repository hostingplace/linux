<!DOCTYPE html>
<!-- saved from url=(0051)file:///C:/Users/ASUS/Downloads/linux%20create.html -->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <title>Linux Web OS v4</title>

    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: monospace;

        background: url("https://www.kali.org/blog/about-the-xz-backdoor/images/xz-utils.jpg")
          center center / cover no-repeat fixed;
        background-color: black; /* fallback kalau gagal load */

        height: 100vh;
        width: 100vw;

        color: white;
        overflow: hidden;
      }

      /* TASKBAR */
      #taskbar {
        position: fixed;
        bottom: 0;
        width: 100%;
        height: 50px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        padding: 0 20px;
      }

      .task-icon {
        font-size: 22px;
        cursor: pointer;
        transition: 0.2s;
      }
      .task-icon:hover {
        transform: scale(1.2);
      }

      #clock {
        margin-left: auto;
      }

      /* WINDOW */
      .window {
        position: absolute;
        width: 700px;
        height: 450px;
        background: #2b2b2b;
        border-radius: 10px;
        box-shadow: 0 0 25px black;
        display: none;
        flex-direction: column;
        overflow: hidden;
        animation: fadeIn 0.15s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .window-header {
        background: #3a3a3a;
        padding: 8px;
        cursor: move;
        display: flex;
        justify-content: space-between;
      }

      .window-buttons span {
        cursor: pointer;
      }

      .window-content {
        flex: 1;
        padding: 10px;
        overflow: auto;
      }

      /* TERMINAL */
      #terminalOutput {
        height: 360px;
        overflow-y: auto;
      }

      #terminalInput {
        width: 100%;
        background: black;
        color: #00ff88;
        border: none;
        padding: 5px;
      }

      /* VS CODE */
      #codeEditor {
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: white;
        border: none;
      }

      /* EXPLORER */
      .file-item {
        padding: 5px;
        cursor: pointer;
      }
      .file-item:hover {
        background: #444;
      }

      /* VS CODE STYLE */
      #editorContainer {
        display: flex;
        height: 100%;
        background: #1e1e1e;
      }

      #lineNumbers {
        width: 50px;
        background: #252526;
        color: #858585;
        padding-top: 5px;
        text-align: right;
        padding-right: 10px;
        font-size: 14px;
        overflow: hidden;
        user-select: none;
      }

      #codeEditor {
        flex: 1;
        background: #1e1e1e;
        color: white;
        border: none;
        outline: none;
        resize: none;
        padding: 5px;
        font-size: 14px;
        line-height: 20px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <!-- TERMINAL -->
    <div class="window" id="terminal" style="top: 80px; left: 200px; display: none;">
      <div class="window-header" onmousedown="dragStart(event, this.parentElement)">
        Terminal
        <div class="window-buttons">
          <span onclick="closeWin(&#39;terminal&#39;)">❌</span>
        </div>
      </div>
      <div class="window-content">
        <div id="terminalOutput">Linux Web OS v4<br>Type 'help'<br></div>
        <input id="terminalInput">
      </div>
    </div>

    <!-- FILE EXPLORER -->
    <div class="window" id="explorer" style="top: 100px; left: 250px">
      <div class="window-header" onmousedown="dragStart(event, this.parentElement)">
        File Explorer
        <div class="window-buttons">
          <span onclick="closeWin(&#39;explorer&#39;)">❌</span>
        </div>
      </div>
      <div class="window-content" id="fileList"></div>
    </div>

    <!-- VS CODE -->
    <div class="window" id="vscode" style="top: 120px; left: 300px">
      <div class="window-header" onmousedown="dragStart(event, this.parentElement)">
        VS Code (Mini)
        <div class="window-buttons">
          <span onclick="closeWin(&#39;vscode&#39;)">❌</span>
        </div>
      </div>
      <div class="window-content">
        <div id="editorContainer">
          <div id="lineNumbers">1<br></div>
          <textarea id="codeEditor">// Start coding...</textarea>
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="window" id="notes">
      <div class="window-header" onmousedown="dragStart(event, this.parentElement)">
        Notes
        <div class="window-buttons">
          <span onclick="closeWin(&#39;notes&#39;)">❌</span>
        </div>
      </div>
      <div class="window-content">
        <textarea style="width: 100%; height: 100%"></textarea>
      </div>
    </div>

    <!-- CALCULATOR -->
    <div class="window" id="calculator">
      <div class="window-header" onmousedown="dragStart(event, this.parentElement)">
        Calculator
        <div class="window-buttons">
          <span onclick="closeWin(&#39;calculator&#39;)">❌</span>
        </div>
      </div>
      <div class="window-content">
        <input id="calcInput" placeholder="2+2">
        <button onclick="calculate()">=</button>
        <div id="calcResult"></div>
      </div>
    </div>

    <!-- TASKBAR (ONLY TERMINAL) -->
    <div id="taskbar">
      <div class="task-icon" onclick="openWin(&#39;terminal&#39;)">📟</div>
      <div id="clock">1:06:25 PM</div>
    </div>

    <script>
      /* DRAG */
      function dragStart(e, el) {
        let ox = e.clientX - el.offsetLeft;
        let oy = e.clientY - el.offsetTop;
        function move(e) {
          el.style.left = e.clientX - ox + "px";
          el.style.top = e.clientY - oy + "px";
        }
        document.addEventListener("mousemove", move);
        document.addEventListener(
          "mouseup",
          () => document.removeEventListener("mousemove", move),
          { once: true },
        );
      }

      /* WINDOW CONTROL */
      function openWin(id) {
        document.getElementById(id).style.display = "flex";
      }
      function closeWin(id) {
        document.getElementById(id).style.display = "none";
      }

      /* CLOCK */
      setInterval(() => {
        document.getElementById("clock").innerText =
          new Date().toLocaleTimeString();
      }, 1000);

      /* FILE SYSTEM */
      let fs = {
        home: {
          user: {
            apps: {
              vscode: "app",
              notes: "app",
              calculator: "app",
            },
            "readme.txt": "Welcome to WebOS v4",
          },
        },
      };

      let path = ["home", "user"];
      let username = "user";
      let history = [];

      function getDir() {
        let dir = fs;
        for (let p of path) dir = dir[p];
        return dir;
      }

      function print(t) {
        let out = document.getElementById("terminalOutput");
        out.innerHTML += t + "<br>";
        out.scrollTop = out.scrollHeight;
      }

      /* EXPLORER */
      function updateExplorer() {
        let dir = getDir();
        let list = document.getElementById("fileList");
        list.innerHTML = "";
        for (let f in dir) {
          let div = document.createElement("div");
          div.className = "file-item";
          div.innerText = f;
          div.onclick = () => print(f);
          list.appendChild(div);
        }
      }

      /* TERMINAL */
      document
        .getElementById("terminalInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            let cmd = this.value;
            history.push(cmd);
            print(
              `<span style="color:#00ff88">${username}@webos:~$</span> ${cmd}`,
            );
            handle(cmd);
            this.value = "";
          }
        });

      function handle(cmd) {
        let parts = cmd.split(" ");
        let c = parts[0];
        let arg = parts[1];

        switch (c) {
          case "help":
            print("Commands:");
            print("ls, cd, pwd, mkdir, touch, rm");
            print("explorer");
            print("open vscode | notes | calculator");
            break;

          case "ls":
            for (let f in getDir()) print(f);
            break;

          case "pwd":
            print("/" + path.join("/"));
            break;

          case "cd":
            if (arg === "..") {
              if (path.length > 1) path.pop();
            } else if (getDir()[arg]) path.push(arg);
            else print("No such directory");
            break;

          case "explorer":
            openWin("explorer");
            updateExplorer();
            break;

          case "open":
            if (arg === "vscode") openWin("vscode");
            else if (arg === "notes") openWin("notes");
            else if (arg === "calculator") openWin("calculator");
            else print("App not found");
            break;

          case "clear":
            document.getElementById("terminalOutput").innerHTML = "";
            break;

          default:
            print("Command not found");
        }
      }

      /* CALCULATOR */
      function calculate() {
        let input = document.getElementById("calcInput").value;
        try {
          document.getElementById("calcResult").innerText = eval(input);
        } catch {
          document.getElementById("calcResult").innerText = "Error";
        }
      }

      print("Linux Web OS v4");
      print("Type 'help'");

      /* VS CODE LINE NUMBER SYSTEM */

      const editor = document.getElementById("codeEditor");
      const lineNumbers = document.getElementById("lineNumbers");

      function updateLineNumbers() {
        const lines = editor.value.split("\n").length;
        lineNumbers.innerHTML = "";
        for (let i = 1; i <= lines; i++) {
          lineNumbers.innerHTML += i + "<br>";
        }
      }

      editor.addEventListener("input", updateLineNumbers);
      editor.addEventListener("scroll", () => {
        lineNumbers.scrollTop = editor.scrollTop;
      });

      updateLineNumbers();
    </script>
  

</body></html>
