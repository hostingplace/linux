<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Kali Linux v4.0.1</title>
    <style>
      :root {
        --kali-blue: #62a0ea;
        --kali-dark: #1a1a1a;
        --terminal-green: #00ff88;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: url("https://www.kali.org/blog/about-the-xz-backdoor/images/xz-utils.jpg")
          center/cover;
        height: 100vh;
        width: 100vw;
        color: white;
        overflow: hidden;
      }

      /* --- TASKBAR --- */
      #taskbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 35px;
        background: rgba(15, 15, 15, 0.95);
        border-bottom: 1px solid #1f5b5b;
        display: flex;
        align-items: center;
        padding: 0 15px;
        z-index: 9999;
      }
      .launcher-icons {
        display: flex;
        align-items: center;
        border-right: 1px solid #333;
        padding-right: 10px;
        margin-right: 10px;
      }
      .task-icon {
        margin-right: 12px;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
        position: relative;
      }
      .task-icon:hover {
        transform: scale(1.2);
      }

      /* Area untuk aplikasi yang sedang berjalan (Minimized Apps) */
      #active-apps {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .active-item {
        background: rgba(255, 255, 255, 0.1);
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        border-bottom: 2px solid var(--kali-blue);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* --- DESKTOP --- */
      .desktop {
        position: absolute;
        inset: 40px 0 0 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        z-index: 1;
      }
      .d-icon {
        width: 80px;
        text-align: center;
        cursor: pointer;
      }
      .d-symbol {
        font-size: 40px;
        display: block;
        margin-bottom: 5px;
      }
      .d-label {
        font-size: 12px;
        text-shadow: 1px 1px 2px black;
      }

      /* --- WINDOW SYSTEM --- */
      .window {
        position: absolute;
        background: var(--kali-dark);
        border: 1px solid #333;
        border-radius: 6px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        display: none;
        flex-direction: column;
        min-width: 300px;
        min-height: 200px;
      }
      .window.maximized {
        top: 35px !important;
        left: 0 !important;
        width: 100% !important;
        height: calc(100vh - 35px) !important;
        border-radius: 0;
      }
      .window-header {
        background: #000;
        padding: 6px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: move;
        border-radius: 6px 6px 0 0;
        border-bottom: 1px solid #222;
      }
      .window-controls {
        display: flex;
        gap: 10px;
      }
      .window-controls span {
        cursor: pointer;
        font-size: 12px;
        padding: 2px 5px;
        border-radius: 3px;
        transition: 0.2s;
      }
      .win-min:hover {
        background: #444;
      }
      .win-max:hover {
        background: #444;
      }
      .win-close:hover {
        background: #e81123;
      }

      .window-content {
        flex: 1;
        overflow: auto;
        position: relative;
      }

      /* --- BROWSER MULTI-TAB --- */
      .browser-tabs {
        display: flex;
        background: #222;
        padding: 5px 5px 0 5px;
        gap: 2px;
      }
      .tab {
        background: #333;
        padding: 6px 12px;
        font-size: 11px;
        border-radius: 5px 5px 0 0;
        cursor: pointer;
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        color: #aaa;
      }
      .tab.active {
        background: #444;
        color: white;
        border-bottom: 2px solid var(--kali-blue);
      }
      .browser-nav {
        display: flex;
        background: #222;
        padding: 5px;
        gap: 5px;
        border-bottom: 1px solid #333;
      }
      .browser-nav input {
        flex: 1;
        background: #000;
        color: white;
        border: 1px solid #444;
        padding: 4px 10px;
        font-size: 12px;
        outline: none;
      }

      /* --- FILE EXPLORER --- */
      .explorer-toolbar {
        background: #222;
        padding: 8px;
        border-bottom: 1px solid #333;
        font-size: 12px;
      }
      .file-list {
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(auto-fill, 90px);
        gap: 10px;
      }
      .file-item {
        text-align: center;
        cursor: pointer;
        font-size: 11px;
        padding: 10px;
        border-radius: 4px;
      }
      .file-item:hover {
        background: rgba(98, 160, 234, 0.2);
      }

      /* --- VS CODE --- */
      #editor-container {
        display: flex;
        height: 100%;
        background: #1e1e1e;
      }
      #line-nums {
        width: 35px;
        background: #252526;
        color: #858585;
        text-align: right;
        padding-right: 8px;
        padding-top: 5px;
        font-size: 12px;
        border-right: 1px solid #333;
      }
      #code-area {
        flex: 1;
        background: #1e1e1e;
        color: #d4d4d4;
        border: none;
        outline: none;
        resize: none;
        padding: 5px;
        font-family: "Consolas", monospace;
      }

      /* --- TERMINAL --- */
      #term-out {
        padding: 10px;
        font-family: "Courier New", monospace;
        font-size: 14px;
        color: #fff;
      }
      #term-in {
        background: transparent;
        border: none;
        color: var(--terminal-green);
        outline: none;
        flex: 1;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="taskbar">
      <div class="launcher-icons">
        <div class="task-icon" onclick="openWin('terminal')" title="Terminal">
          📟
        </div>
        <div
          class="task-icon"
          onclick="openWin('explorer')"
          title="File Manager"
        >
          📂
        </div>
        <div class="task-icon" onclick="openWin('browser')" title="Firefox">
          🌐
        </div>
        <div class="task-icon" onclick="openWin('vscode')" title="VS Code">
          📝
        </div>
      </div>

      <div id="active-apps"></div>

      <div
        style="
          margin-left: auto;
          font-size: 12px;
          color: var(--kali-blue);
          font-weight: bold;
        "
        id="clock"
      ></div>
    </div>

    <div class="desktop">
      <div class="d-icon" onclick="openWin('explorer')">
        <span class="d-symbol">📂</span>
        <span class="d-label">Home</span>
      </div>
      <div class="d-icon" onclick="openWin('terminal')">
        <span class="d-symbol">📟</span>
        <span class="d-label">Terminal</span>
      </div>
    </div>

    <div
      class="window"
      id="terminal"
      style="width: 600px; height: 350px; top: 80px; left: 100px"
    >
      <div class="window-header" onmousedown="dragStart(event, 'terminal')">
        <span style="font-size: 11px">kali@webos: ~</span>
        <div class="window-controls">
          <span class="win-min" onclick="minimizeWin('terminal', 'Terminal')"
            >_</span
          >
          <span class="win-max" onclick="maximizeWin('terminal')">▢</span>
          <span class="win-close" onclick="closeWin('terminal')">×</span>
        </div>
      </div>
      <div class="window-content" style="background: rgba(0, 0, 0, 0.92)">
        <div id="term-out"></div>
        <div style="display: flex; padding-left: 10px">
          <span style="color: var(--terminal-green)">kali@linux:~$ &nbsp;</span>
          <input id="term-in" autofocus />
        </div>
      </div>
    </div>

    <div
      class="window"
      id="browser"
      style="width: 80%; height: 75%; top: 60px; left: 60px"
    >
      <div class="window-header" onmousedown="dragStart(event, 'browser')">
        <span style="font-size: 11px">Firefox ESR</span>
        <div class="window-controls">
          <span class="win-min" onclick="minimizeWin('browser', 'Browser')"
            >_</span
          >
          <span class="win-max" onclick="maximizeWin('browser')">▢</span>
          <span class="win-close" onclick="closeWin('browser')">×</span>
        </div>
      </div>
      <div class="browser-tabs" id="browserTabs"></div>
      <div class="browser-nav">
        <input id="urlInput" value="https://www.bing.com" />
        <button onclick="loadUrl()">Go</button>
        <button onclick="addTab()">+</button>
      </div>
      <div class="window-content">
        <iframe
          id="browserFrame"
          style="width: 100%; height: 100%; border: none; background: white"
        ></iframe>
      </div>
    </div>

    <div
      class="window"
      id="explorer"
      style="width: 500px; height: 350px; top: 120px; left: 150px"
    >
      <div class="window-header" onmousedown="dragStart(event, 'explorer')">
        <span style="font-size: 11px">File Manager</span>
        <div class="window-controls">
          <span class="win-min" onclick="minimizeWin('explorer', 'Files')"
            >_</span
          >
          <span class="win-max" onclick="maximizeWin('explorer')">▢</span>
          <span class="win-close" onclick="closeWin('explorer')">×</span>
        </div>
      </div>
      <div class="explorer-toolbar">
        <button onclick="changeDir('..')">⬅ Back</button> | Path:
        <span id="path-ui">/home/kali</span>
      </div>
      <div class="window-content" id="file-list-view"></div>
    </div>

    <div
      class="window"
      id="vscode"
      style="width: 700px; height: 450px; top: 100px; left: 250px"
    >
      <div class="window-header" onmousedown="dragStart(event, 'vscode')">
        <span style="font-size: 11px">Visual Studio Code</span>
        <div class="window-controls">
          <span class="win-min" onclick="minimizeWin('vscode', 'VS Code')"
            >_</span
          >
          <span class="win-max" onclick="maximizeWin('vscode')">▢</span>
          <span class="win-close" onclick="closeWin('vscode')">×</span>
        </div>
      </div>
      <div class="window-content">
        <div id="editor-container">
          <div id="line-nums">1</div>
          <textarea id="code-area" spellcheck="false"></textarea>
        </div>
      </div>
    </div>

    <script>
      /* --- STATE --- */
      let zIdx = 1000;
      let runningApps = {}; // Melacak aplikasi yang sedang berjalan/diminimize
      let fs = {
        home: {
          kali: {
            Desktop: {},
            Documents: {},
            "note.txt": "Kali Linux Web Edition",
          },
        },
      };
      let currentPath = ["home", "kali"];
      let tabs = [{ title: "Bing", url: "https://www.bing.com" }];
      let activeTabIdx = 0;

      /* --- WINDOW MANAGER --- */
      function openWin(id) {
        const win = document.getElementById(id);
        win.style.display = "flex";
        win.style.zIndex = ++zIdx;

        // Hapus dari daftar taskbar jika dibuka kembali
        if (runningApps[id]) {
          delete runningApps[id];
          renderActiveApps();
        }

        if (id === "explorer") renderExplorer();
        if (id === "browser") renderTabs();
      }

      function closeWin(id) {
        document.getElementById(id).style.display = "none";
        document.getElementById(id).classList.remove("maximized");
        delete runningApps[id];
        renderActiveApps();
      }

      function minimizeWin(id, label) {
        document.getElementById(id).style.display = "none";
        runningApps[id] = label;
        renderActiveApps();
      }

      function maximizeWin(id) {
        document.getElementById(id).classList.toggle("maximized");
      }

      function renderActiveApps() {
        const container = document.getElementById("active-apps");
        container.innerHTML = "";
        for (let id in runningApps) {
          let div = document.createElement("div");
          div.className = "active-item";
          div.innerHTML = `<span>📂</span> ${runningApps[id]}`;
          div.onclick = () => openWin(id);
          container.appendChild(div);
        }
      }

      function dragStart(e, id) {
        const el = document.getElementById(id);
        if (el.classList.contains("maximized")) return;
        el.style.zIndex = ++zIdx;
        let ox = e.clientX - el.offsetLeft;
        let oy = e.clientY - el.offsetTop;
        document.onmousemove = (e) => {
          el.style.left = e.clientX - ox + "px";
          el.style.top = e.clientY - oy + "px";
        };
        document.onmouseup = () => (document.onmousemove = null);
      }

      /* --- BROWSER --- */
      function renderTabs() {
        const container = document.getElementById("browserTabs");
        container.innerHTML = "";
        tabs.forEach((tab, i) => {
          let t = document.createElement("div");
          t.className = `tab ${i === activeTabIdx ? "active" : ""}`;
          t.innerHTML = `${tab.title} <span onclick="closeTab(${i}, event)">×</span>`;
          t.onclick = () => {
            activeTabIdx = i;
            renderTabs();
            updateIframe();
          };
          container.appendChild(t);
        });
        updateIframe();
      }
      function addTab() {
        if (tabs.length < 7) {
          tabs.push({ title: "New Tab", url: "https://www.bing.com" });
          activeTabIdx = tabs.length - 1;
          renderTabs();
        }
      }
      function closeTab(i, e) {
        e.stopPropagation();
        if (tabs.length > 1) {
          tabs.splice(i, 1);
          activeTabIdx = 0;
          renderTabs();
        }
      }
      function updateIframe() {
        document.getElementById("browserFrame").src = tabs[activeTabIdx].url;
        document.getElementById("urlInput").value = tabs[activeTabIdx].url;
      }
      function loadUrl() {
        let url = document.getElementById("urlInput").value;
        if (!url.startsWith("http")) url = "https://" + url;
        tabs[activeTabIdx].url = url;
        renderTabs();
      }

      /* --- EXPLORER --- */
      function getDir() {
        let d = fs;
        currentPath.forEach((p) => (d = d[p]));
        return d;
      }
      function renderExplorer() {
        const view = document.getElementById("file-list-view");
        view.className = "file-list";
        view.innerHTML = "";
        document.getElementById("path-ui").innerText =
          "/" + currentPath.join("/");
        let dir = getDir();
        for (let n in dir) {
          let isDir = typeof dir[n] === "object";
          view.innerHTML += `<div class="file-item" ondblclick="${isDir ? `changeDir('${n}')` : ""}">
                <div style="font-size: 30px;">${isDir ? "📁" : "📄"}</div>
                <div>${n}</div>
            </div>`;
        }
      }
      function changeDir(n) {
        if (n === "..") {
          if (currentPath.length > 2) currentPath.pop();
        } else {
          currentPath.push(n);
        }
        renderExplorer();
      }

      /* --- TERMINAL --- */
      document.getElementById("term-in").onkeydown = (e) => {
        if (e.key === "Enter") {
          let cmd = e.target.value.trim();
          printTerm(
            `<span style="color:var(--terminal-green)">kali@webos:~$</span> ${cmd}`,
          );
          handleCmd(cmd);
          e.target.value = "";
        }
      };
      function printTerm(t) {
        const o = document.getElementById("term-out");
        o.innerHTML += `<div>${t}</div>`;
        o.parentElement.scrollTop = o.parentElement.scrollHeight;
      }
      function handleCmd(raw) {
        let p = raw.split(" ");
        let c = p[0];
        let arg = p.slice(1).join(" ");
        let d = getDir();

        switch (c) {
          /* ================= BASIC ================= */
          case "ls":
            printTerm(Object.keys(d).join("  "));
            break;

          case "pwd":
            printTerm("/" + currentPath.join("/"));
            break;

          case "clear":
            document.getElementById("term-out").innerHTML = "";
            break;

          case "mkdir":
            if (arg) {
              d[arg] = {};
              renderExplorer();
            }
            break;

          case "touch":
            if (arg) {
              d[arg] = "";
              renderExplorer();
            }
            break;

          /* ================= NMAP ================= */
          case "nmap":
            printTerm("Starting Nmap 7.94 ( https://nmap.org )...");
            setTimeout(() => {
              printTerm("Scanning target: " + (arg || "127.0.0.1"));
            }, 500);

            setTimeout(() => {
              printTerm("PORT     STATE SERVICE");
              printTerm("22/tcp   open  ssh");
              printTerm("80/tcp   open  http");
              printTerm("443/tcp  open  https");
            }, 1200);

            setTimeout(() => {
              printTerm("Nmap scan done: 1 IP address scanned.");
            }, 1800);
            break;

          /* ================= AIRCRACK ================= */
          case "aircrack-ng":
            printTerm("Aircrack-ng 1.7 - WiFi Security Tool");
            setTimeout(() => {
              printTerm("[+] Starting attack on interface wlan0...");
            }, 500);

            setTimeout(() => {
              printTerm("[+] Capturing packets...");
            }, 1000);

            setTimeout(() => {
              printTerm("[+] Cracking WPA handshake...");
            }, 1500);

            setTimeout(() => {
              printTerm("[KEY FOUND!] password: 12345678");
            }, 2500);
            break;

          /* ================= APT INSTALL ================= */
          case "apt":
            if (p[1] === "install") {
              if (!p[2]) {
                printTerm("E: Please specify package name");
                break;
              }

              let pkg = p[2];

              printTerm("Reading package lists... Done");
              setTimeout(() => {
                printTerm("Building dependency tree... Done");
              }, 500);

              setTimeout(() => {
                printTerm("Installing " + pkg + " ...");
              }, 1000);

              setTimeout(() => {
                printTerm(pkg + " successfully installed ✔");
              }, 1800);
            } else {
              printTerm("apt: command not recognized");
            }
            break;

          /* ================= GIT ================= */
          case "git":
            if (p[1] === "init") {
              printTerm(
                "Initialized empty Git repository in /" +
                  currentPath.join("/") +
                  "/.git/",
              );
              setTimeout(() => {
                printTerm("git version 2.43.0");
              }, 500);

              if (p.includes("-v")) {
                setTimeout(() => {
                  printTerm("Verbose mode enabled");
                }, 800);
              }
            } else {
              printTerm("git: unknown command");
            }
            break;

          /* ================= NPM (UPGRADE VERSION) ================= */
          case "npm":
            if (p[1] === "boost") {
              printTerm("Optimizing system performance...");
              setTimeout(() => {
                printTerm("[✓] Cleaning memory cache...");
              }, 500);

              setTimeout(() => {
                printTerm("[✓] Rebuilding system modules...");
              }, 1000);

              setTimeout(() => {
                printTerm("[✓] Boosting kernel response...");
              }, 1500);

              setTimeout(() => {
                printTerm("System successfully optimized 🚀");
              }, 2200);
            } else {
              printTerm("npm: unknown command");
            }
            break;

          /* ================= HELP ================= */
          case "help":
            printTerm("Available commands:");
            printTerm("ls, pwd, mkdir, touch, clear");
            printTerm("nmap, aircrack-ng");
            printTerm("apt install <package>");
            printTerm("git init -v");
            printTerm("npm boost");
            break;

          /* ================= DEFAULT ================= */
          default:
            if (c) printTerm(`bash: ${c}: command clear found`);
        }
      }

      setInterval(() => {
        document.getElementById("clock").innerText =
          new Date().toLocaleTimeString();
      }, 1000);
    </script>
  </body>
</html>
